name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy code to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./*"
          target: "~/AccodigiBackend_temp"
          rm: true
          exclude: "node_modules, .git, .github"

      - name: Post-deployment setup on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Pass secrets as environment variables into the SSH session
          envs: BACKEND_DOT_ENV,SERVICE_ACCOUNT_JSON
          script: |
            # Explicitly source profile to find Node/NVM/PM2
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" 
            source ~/.bashrc || source ~/.profile || true

            # Create project directory
            mkdir -p ~/AccodigiBackend

            # Sync files
            cp -r ~/AccodigiBackend_temp/* ~/AccodigiBackend/

            cd ~/AccodigiBackend

            # Write secrets directly via SSH (bypasses SCP dotfile issue)
            printf '%s' "$BACKEND_DOT_ENV" > .env
            printf '%s' "$SERVICE_ACCOUNT_JSON" > service-account.json

            # Verify
            echo ".env size: $(wc -c < .env) bytes"

            # Install dependencies
            npm install
            npx prisma generate
            npx prisma migrate deploy

            # Restart with PM2
            pm2 delete truelog-backend || true
            pm2 start server.js --name truelog-backend
            pm2 save
        env:
          BACKEND_DOT_ENV: ${{ secrets.BACKEND_DOT_ENV }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
