name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy code to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Exclude node_modules and other unneeded files
          # We copy to a temporary directory first
          source: "./*"
          target: "~/AccodigiBackend_temp"
          rm: true
          exclude: "node_modules, .git, .github, .env, service-account.json"

      - name: Post-deployment setup on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Explicitly source profile to find Node/NPM/PM2
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" 
            source ~/.bashrc || source ~/.profile || true
            
            # Create project directory if it doesn't exist
            mkdir -p ~/AccodigiBackend
            
            # Sync temp files to project directory
            cp -r ~/AccodigiBackend_temp/* ~/AccodigiBackend/
            
            cd ~/AccodigiBackend
            
            # Setup environment and secrets
            echo "${{ secrets.BACKEND_DOT_ENV }}" > .env
            echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json
            
            # Install dependencies and build
            npm install
            npx prisma generate
            npx prisma migrate deploy
            
            # Restart service with PM2
            pm2 restart truelog-backend || pm2 start server.js --name truelog-backend
